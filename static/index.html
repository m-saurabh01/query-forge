<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueryForge — NL to SQL</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside id="sidebar">
        <div class="sidebar-top">
            <button id="sidebar-toggle" class="icon-btn" title="Toggle sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
            <button id="new-chat-btn" class="icon-btn" title="New chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </div>

        <nav id="chat-history" class="chat-history">
            <!-- Chat history items populated by JS -->
        </nav>

        <div class="sidebar-bottom">
            <button id="theme-toggle" class="icon-btn theme-toggle-btn" title="Toggle light/dark mode">
                <svg id="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg id="theme-icon-light" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <span id="theme-label">Light mode</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div id="main-wrapper">
        <!-- Top bar -->
        <header id="topbar">
            <button id="sidebar-open-btn" class="icon-btn topbar-toggle hidden" title="Open sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
            <span class="topbar-title">QueryForge</span>
        </header>

        <!-- Welcome screen (shown when no messages) -->
        <div id="welcome-screen">
            <h1>What can I query for you?</h1>
            <p>Ask questions about your database in plain English</p>
        </div>

        <!-- Chat messages -->
        <main id="chat-container" class="hidden">
            <div id="messages"></div>
        </main>

        <!-- Input area -->
        <footer>
            <form id="query-form" autocomplete="off">
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="query-input"
                        placeholder="Ask anything"
                        autofocus
                    />
                    <button type="submit" id="send-btn" title="Send" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                    </button>
                </div>
            </form>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
